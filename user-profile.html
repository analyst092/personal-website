<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 数据分析师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --green: #00ff88;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: rgba(0, 212, 255, 0.2);
            --admin-gold: #ffd700;
            --danger: #ff6b6b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .logo a {
            color: var(--accent);
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem 4rem;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--green) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--bg-card);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .profile-header h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: var(--text-dim);
        }

        .profile-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-group .hint {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #0099cc 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--green);
            color: var(--green);
            display: block;
        }

        .message.error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            display: block;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--accent);
            margin-top: 1rem;
        }

        .user-badge.admin {
            background: rgba(255, 215, 0, 0.1);
            border-color: var(--admin-gold);
            color: var(--admin-gold);
        }

        @media (max-width: 768px) {
            .container {
                padding: 5rem 1rem 3rem;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">田承奇</a></div>
        <div class="nav-right">
            <a href="index.html" class="back-btn">← 返回主页</a>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="profile-avatar" id="profile-avatar">用</div>
            <h1 id="profile-name">用户昵称</h1>
            <p id="profile-phone">138****8000</p>
            <div class="user-badge" id="user-badge">
                <span>👤</span>
                <span>普通用户</span>
            </div>
        </div>

        <div class="profile-card">
            <div class="card-title">
                <span>📝</span>
                <span>基本信息</span>
            </div>
            <div class="message" id="info-message"></div>
            <form id="info-form">
                <div class="form-group">
                    <label>手机号（账号）</label>
                    <input type="text" id="user-phone" disabled>
                    <div class="hint">手机号是您的登录账号，不可修改</div>
                </div>
                <div class="form-group">
                    <label for="user-nickname">昵称</label>
                    <input type="text" id="user-nickname" placeholder="请输入昵称" maxlength="20">
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="save-info-btn">保存修改</button>
                </div>
            </form>
        </div>

        <div class="profile-card">
            <div class="card-title">
                <span>🔐</span>
                <span>修改密码</span>
            </div>
            <div class="message" id="password-message"></div>
            <form id="password-form">
                <div class="form-group">
                    <label for="old-password">当前密码</label>
                    <input type="password" id="old-password" placeholder="请输入当前密码" required>
                </div>
                <div class="form-group">
                    <label for="new-password">新密码</label>
                    <input type="password" id="new-password" placeholder="请输入新密码（至少6位）" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">确认新密码</label>
                    <input type="password" id="confirm-password" placeholder="请再次输入新密码" minlength="6" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary" id="save-pwd-btn">修改密码</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 检查登录状态
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'project-detail.html';
        }

        const userPhone = localStorage.getItem('userPhone');

        // 获取当前用户信息
        function getCurrentUserInfo() {
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            return users.find(u => u.phone === userPhone);
        }

        // 保存用户数据
        function saveUsers(users) {
            localStorage.setItem('registeredUsers', JSON.stringify(users));
        }

        // 显示消息
        function showMessage(elementId, type, text) {
            const msg = document.getElementById(elementId);
            msg.className = `message ${type}`;
            msg.textContent = text;
            setTimeout(() => {
                msg.className = 'message';
                msg.textContent = '';
            }, 3000);
        }

        // 初始化页面
        function initProfile() {
            const user = getCurrentUserInfo();
            if (!user) {
                alert('用户信息异常，请重新登录');
                logout();
                return;
            }

            document.getElementById('profile-avatar').textContent = user.nickname.charAt(0);
            document.getElementById('profile-name').textContent = user.nickname;
            document.getElementById('profile-phone').textContent = user.phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
            document.getElementById('user-phone').value = user.phone;
            document.getElementById('user-nickname').value = user.nickname;

            const badge = document.getElementById('user-badge');
            if (user.isAdmin) {
                badge.className = 'user-badge admin';
                badge.innerHTML = '<span>👑</span><span>管理员</span>';
            }
        }

        // 修改基本信息
        document.getElementById('info-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nickname = document.getElementById('user-nickname').value.trim();
            
            if (nickname.length < 2) {
                showMessage('info-message', 'error', '昵称至少2个字符');
                return;
            }

            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const userIndex = users.findIndex(u => u.phone === userPhone);

            if (userIndex === -1) {
                showMessage('info-message', 'error', '用户信息异常');
                return;
            }

            users[userIndex].nickname = nickname;
            saveUsers(users);
            localStorage.setItem('currentUser', nickname);

            showMessage('info-message', 'success', '基本信息修改成功');
            initProfile();
        });

        // 修改密码
        document.getElementById('password-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword.length < 6) {
                showMessage('password-message', 'error', '新密码至少6位');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('password-message', 'error', '两次输入的新密码不一致');
                return;
            }

            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const userIndex = users.findIndex(u => u.phone === userPhone);

            if (userIndex === -1) {
                showMessage('password-message', 'error', '用户信息异常');
                return;
            }

            if (users[userIndex].password !== oldPassword) {
                showMessage('password-message', 'error', '当前密码错误');
                return;
            }

            users[userIndex].password = newPassword;
            saveUsers(users);

            document.getElementById('password-form').reset();
            showMessage('password-message', 'success', '密码修改成功');
        });

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userPhone');
            window.location.href = 'index.html';
        }

        // 初始化
        initProfile();
    </script>
</body>
</html>
