<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - 数据分析师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --green: #00ff88;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: rgba(0, 212, 255, 0.2);
            --admin-gold: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.8;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: rgba(15, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .logo a {
            color: var(--accent);
            text-decoration: none;
        }

        .back-btn {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .project-hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .project-tag {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 50px;
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .project-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #fff;
        }

        .project-hero-desc {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .project-detail {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 3rem;
        }

        .detail-section {
            margin-bottom: 2.5rem;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-title::before {
            content: '#';
            color: var(--text-dim);
        }

        .detail-content {
            color: var(--text);
            font-size: 1rem;
        }

        .detail-content p {
            margin-bottom: 1rem;
            color: var(--text-dim);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            margin-bottom: 0.3rem;
        }

        .metric-label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .tech-tag {
            padding: 0.5rem 1.2rem;
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text);
        }

        .task-list {
            list-style: none;
        }

        .task-list li {
            padding: 0.8rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text-dim);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .task-list li::before {
            content: '>';
            position: absolute;
            left: 0;
            color: var(--green);
        }

        .task-list li:last-child {
            border-bottom: none;
        }

        .result-list {
            list-style: none;
        }

        .result-list li {
            padding: 0.8rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--green);
        }

        .result-list li:last-child {
            border-bottom: none;
        }

        .project-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
        }

        .nav-link {
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
            min-width: 200px;
        }

        .nav-link:hover {
            border-color: var(--accent);
        }

        .nav-link-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.3rem;
        }

        .nav-link-title {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .project-hero h1 {
                font-size: 1.8rem;
            }

            .project-detail {
                padding: 1.5rem;
            }

            .project-nav {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* 登录模态框 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .login-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .login-modal {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            transform: translateY(-20px);
            transition: all 0.3s;
        }

        .login-overlay.active .login-modal {
            transform: translateY(0);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .form-group input {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .login-btn {
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent) 0%, #0099cc 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
        }

        .login-hint {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-hint p {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .login-hint code {
            background: rgba(0, 212, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--accent);
        }

        /* 用户状态栏 */
        .user-status {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--green) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #fff;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .login-prompt {
            padding: 0.5rem 1rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-prompt:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .switch-link {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s;
        }

        .switch-link:hover {
            text-decoration: underline;
        }

        .profile-link {
            padding: 0.5rem 1rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--accent);
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .profile-link:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .admin-link {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .admin-link:hover {
            border-color: var(--admin-gold);
            color: var(--admin-gold);
        }

        .captcha-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .captcha-row input {
            flex: 1;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }

        .captcha-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #captcha-canvas {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            cursor: pointer;
        }

        .refresh-hint {
            color: var(--accent);
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .refresh-hint:hover {
            text-decoration: underline;
        }

        .sms-row {
            display: flex;
            gap: 0.8rem;
        }

        .sms-row input {
            flex: 1;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }

        .sms-row input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .sms-btn {
            padding: 1rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 10px;
            color: var(--accent);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            min-width: 120px;
        }

        .sms-btn:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.2);
        }

        .sms-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .sms-hint {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--green);
            min-height: 1.2rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">田承奇</a></div>
        <div class="user-status">
            <a href="index.html#projects" class="back-btn">← 返回主页</a>
            <div id="user-status-area"></div>
        </div>
    </nav>

    <!-- 登录/注册模态框 -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-modal">
            <!-- 登录表单 -->
            <div id="login-panel">
                <div class="login-header">
                    <h2>登录</h2>
                    <p>查看项目详情需要登录</p>
                </div>
                <form class="login-form" id="login-form">
                    <div class="form-group">
                        <label for="login-phone">手机号</label>
                        <input type="tel" id="login-phone" name="phone" placeholder="请输入手机号" maxlength="11" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" name="password" placeholder="请输入密码" required>
                    </div>
                    <div class="login-error" id="login-error"></div>
                    <button type="submit" class="login-btn" id="login-btn">登录</button>
                </form>
                <div class="login-hint">
                    <p>还没有账号？<a href="javascript:void(0)" onclick="auth.showRegister()" class="switch-link">立即注册</a></p>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="register-panel" style="display:none">
                <div class="login-header">
                    <h2>注册</h2>
                    <p>创建账号以查看项目详情</p>
                </div>
                <form class="login-form" id="register-form">
                    <div class="form-group">
                        <label for="reg-phone">手机号</label>
                        <input type="tel" id="reg-phone" name="phone" placeholder="请输入手机号" maxlength="11" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-nickname">昵称</label>
                        <input type="text" id="reg-nickname" name="nickname" placeholder="请输入昵称" maxlength="20" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">密码</label>
                        <input type="password" id="reg-password" name="password" placeholder="请输入密码（至少6位）" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">确认密码</label>
                        <input type="password" id="reg-confirm" name="confirm" placeholder="请再次输入密码" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label>图形验证码</label>
                        <div class="captcha-row">
                            <input type="text" id="reg-captcha" placeholder="请输入验证码" maxlength="4" required>
                            <canvas id="captcha-canvas" width="120" height="40" onclick="auth.refreshCaptcha()"></canvas>
                            <span class="refresh-hint" onclick="auth.refreshCaptcha()">换一张</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>短信验证码</label>
                        <div class="sms-row">
                            <input type="text" id="reg-sms" placeholder="请输入6位验证码" maxlength="6" required>
                            <button type="button" class="sms-btn" id="sms-btn" onclick="auth.sendSmsCode()">获取验证码</button>
                        </div>
                        <div class="sms-hint" id="sms-hint"></div>
                    </div>
                    <div class="login-error" id="register-error"></div>
                    <button type="submit" class="login-btn" id="register-btn">注册</button>
                </form>
                <div class="login-hint">
                    <p>已有账号？<a href="javascript:void(0)" onclick="auth.showLogin()" class="switch-link">立即登录</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="project-hero">
            <div class="project-tag">项目详情</div>
            <h1 id="project-title">项目名称</h1>
            <p class="project-hero-desc" id="project-desc">项目简介</p>
        </div>

        <div class="project-detail">
            <div class="detail-section">
                <div class="detail-title">项目背景</div>
                <div class="detail-content" id="project-background"></div>
            </div>

            <div class="detail-section">
                <div class="detail-title">核心指标</div>
                <div class="metrics-grid" id="project-metrics"></div>
            </div>

            <div class="detail-section">
                <div class="detail-title">技术栈</div>
                <div class="tech-tags" id="project-tech"></div>
            </div>

            <div class="detail-section">
                <div class="detail-title">我的职责</div>
                <div class="detail-content">
                    <ul class="task-list" id="project-tasks"></ul>
                </div>
            </div>

            <div class="detail-section">
                <div class="detail-title">项目成果</div>
                <div class="detail-content">
                    <ul class="result-list" id="project-results"></ul>
                </div>
            </div>
        </div>

        <div class="project-nav" id="project-nav"></div>
    </div>

    <script>
        // 用户认证系统
        const auth = {
            // 预设用户数据（实际项目中应该从后端验证）
            defaultUsers: [
                { phone: '13800138000', password: '123456', nickname: '管理员' },
                { phone: '13900139000', password: 'guest123', nickname: '访客' }
            ],

            // 图形验证码
            captchaCode: '',
            
            // 短信验证码
            smsCode: '',
            smsExpire: null,
            smsPhone: '',
            smsTimer: null,

            // 获取所有注册用户
            getUsers() {
                const stored = localStorage.getItem('registeredUsers');
                return stored ? JSON.parse(stored) : [];
            },

            // 保存用户数据
            saveUsers(users) {
                localStorage.setItem('registeredUsers', JSON.stringify(users));
            },

            // 获取所有用户（默认+注册）
            getAllUsers() {
                return [...this.defaultUsers, ...this.getUsers()];
            },

            // 手机号格式验证
            isValidPhone(phone) {
                return /^1[3-9]\d{9}$/.test(phone);
            },

            // 检查登录状态
            isLoggedIn() {
                return localStorage.getItem('isLoggedIn') === 'true';
            },

            // 获取当前用户
            getCurrentUser() {
                return localStorage.getItem('currentUser');
            },

            // 登录验证
            login(phone, password) {
                const users = this.getAllUsers();
                const user = users.find(u => u.phone === phone && u.password === password);
                if (user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', user.nickname);
                    localStorage.setItem('userPhone', phone);
                    return { success: true, user: user.nickname };
                }
                return { success: false, message: '手机号或密码错误' };
            },

            // 注册
            register(phone, nickname, password) {
                // 验证手机号格式
                if (!this.isValidPhone(phone)) {
                    return { success: false, message: '请输入正确的手机号格式' };
                }

                // 检查手机号是否已注册
                const allUsers = this.getAllUsers();
                if (allUsers.find(u => u.phone === phone)) {
                    return { success: false, message: '该手机号已注册' };
                }

                // 保存新用户
                const users = this.getUsers();
                users.push({ phone, password, nickname });
                this.saveUsers(users);

                return { success: true, message: '注册成功' };
            },

            // 生成图形验证码
            generateCaptcha() {
                const canvas = document.getElementById('captcha-canvas');
                const ctx = canvas.getContext('2d');
                
                // 清空画布
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 生成随机验证码（4位字母数字组合）
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
                let code = '';
                for (let i = 0; i < 4; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                this.captchaCode = code;
                
                // 绘制干扰线
                for (let i = 0; i < 5; i++) {
                    ctx.strokeStyle = `rgba(${Math.random()*100+100}, ${Math.random()*100+100}, ${Math.random()*100+100}, 0.5)`;
                    ctx.beginPath();
                    ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                    ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                    ctx.stroke();
                }
                
                // 绘制干扰点
                for (let i = 0; i < 30; i++) {
                    ctx.fillStyle = `rgba(${Math.random()*150+50}, ${Math.random()*150+50}, ${Math.random()*150+50}, 0.5)`;
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 绘制验证码文字
                const colors = ['#333', '#666', '#999', '#1a1a2e'];
                for (let i = 0; i < code.length; i++) {
                    ctx.font = `bold ${20 + Math.random() * 8}px Arial`;
                    ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                    ctx.save();
                    ctx.translate(20 + i * 25, 28);
                    ctx.rotate((Math.random() - 0.5) * 0.4);
                    ctx.fillText(code[i], 0, 0);
                    ctx.restore();
                }
            },

            // 刷新图形验证码
            refreshCaptcha() {
                this.generateCaptcha();
                document.getElementById('reg-captcha').value = '';
            },

            // 验证图形验证码
            verifyCaptcha(inputCode) {
                return inputCode.toLowerCase() === this.captchaCode.toLowerCase();
            },

            // 发送短信验证码
            sendSmsCode() {
                const phone = document.getElementById('reg-phone').value.trim();
                const captchaInput = document.getElementById('reg-captcha').value.trim();
                const smsBtn = document.getElementById('sms-btn');
                const smsHint = document.getElementById('sms-hint');

                // 验证手机号
                if (!this.isValidPhone(phone)) {
                    alert('请先输入正确的手机号');
                    return;
                }

                // 验证图形验证码
                if (!this.verifyCaptcha(captchaInput)) {
                    alert('图形验证码错误，请重新输入');
                    this.refreshCaptcha();
                    return;
                }

                // 检查是否已注册
                const allUsers = this.getAllUsers();
                if (allUsers.find(u => u.phone === phone)) {
                    alert('该手机号已注册');
                    return;
                }

                // 生成6位随机验证码
                this.smsCode = '';
                for (let i = 0; i < 6; i++) {
                    this.smsCode += Math.floor(Math.random() * 10);
                }
                
                // 设置过期时间（3分钟）
                this.smsExpire = Date.now() + 3 * 60 * 1000;
                this.smsPhone = phone;

                // 显示验证码（实际项目中应该调用短信API）
                alert(`【验证码】您的验证码是：${this.smsCode}，有效期3分钟，请勿泄露给他人。`);

                // 开始倒计时
                smsBtn.disabled = true;
                let countdown = 60;
                smsBtn.textContent = `${countdown}s后重发`;
                smsHint.textContent = `验证码已发送至 ${phone}`;

                this.smsTimer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(this.smsTimer);
                        smsBtn.disabled = false;
                        smsBtn.textContent = '获取验证码';
                    } else {
                        smsBtn.textContent = `${countdown}s后重发`;
                    }
                }, 1000);
            },

            // 验证短信验证码
            verifySmsCode(phone, inputCode) {
                // 检查是否过期
                if (Date.now() > this.smsExpire) {
                    return { valid: false, message: '验证码已过期，请重新获取' };
                }
                // 检查手机号是否一致
                if (phone !== this.smsPhone) {
                    return { valid: false, message: '手机号与发送验证码的手机号不一致' };
                }
                // 检查验证码
                if (inputCode !== this.smsCode) {
                    return { valid: false, message: '验证码错误' };
                }
                return { valid: true };
            },

            // 初始化认证系统
            init() {
                this.updateUserStatus();

                // 绑定登录表单事件
                const loginForm = document.getElementById('login-form');
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const phone = document.getElementById('login-phone').value.trim();
                    const password = document.getElementById('login-password').value;
                    const errorDiv = document.getElementById('login-error');
                    const loginBtn = document.getElementById('login-btn');

                    // 验证手机号格式
                    if (!this.isValidPhone(phone)) {
                        errorDiv.textContent = '请输入正确的手机号格式';
                        return;
                    }

                    loginBtn.disabled = true;
                    loginBtn.textContent = '登录中...';

                    setTimeout(() => {
                        const result = this.login(phone, password);
                        if (result.success) {
                            this.hideLoginModal();
                            this.updateUserStatus();
                            renderProject();
                        } else {
                            errorDiv.textContent = result.message;
                        }
                        loginBtn.disabled = false;
                        loginBtn.textContent = '登录';
                    }, 500);
                });

                // 绑定注册表单事件
                const registerForm = document.getElementById('register-form');
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const phone = document.getElementById('reg-phone').value.trim();
                    const nickname = document.getElementById('reg-nickname').value.trim();
                    const password = document.getElementById('reg-password').value;
                    const confirm = document.getElementById('reg-confirm').value;
                    const captchaInput = document.getElementById('reg-captcha').value.trim();
                    const smsInput = document.getElementById('reg-sms').value.trim();
                    const errorDiv = document.getElementById('register-error');
                    const regBtn = document.getElementById('register-btn');

                    // 验证手机号格式
                    if (!this.isValidPhone(phone)) {
                        errorDiv.textContent = '请输入正确的手机号格式';
                        return;
                    }

                    // 验证昵称
                    if (nickname.length < 2) {
                        errorDiv.textContent = '昵称至少2个字符';
                        return;
                    }

                    // 验证密码
                    if (password.length < 6) {
                        errorDiv.textContent = '密码至少6位';
                        return;
                    }

                    // 验证确认密码
                    if (password !== confirm) {
                        errorDiv.textContent = '两次密码输入不一致';
                        return;
                    }

                    // 验证图形验证码
                    if (!this.verifyCaptcha(captchaInput)) {
                        errorDiv.textContent = '图形验证码错误';
                        this.refreshCaptcha();
                        return;
                    }

                    // 验证短信验证码
                    const smsResult = this.verifySmsCode(phone, smsInput);
                    if (!smsResult.valid) {
                        errorDiv.textContent = smsResult.message;
                        return;
                    }

                    regBtn.disabled = true;
                    regBtn.textContent = '注册中...';

                    setTimeout(() => {
                        const result = this.register(phone, nickname, password);
                        if (result.success) {
                            errorDiv.textContent = '';
                            alert('注册成功！请登录');
                            this.showLogin();
                            document.getElementById('login-phone').value = phone;
                        } else {
                            errorDiv.textContent = result.message;
                        }
                        regBtn.disabled = false;
                        regBtn.textContent = '注册';
                    }, 500);
                });

                // 点击遮罩层关闭模态框
                document.getElementById('login-overlay').addEventListener('click', (e) => {
                    if (e.target.id === 'login-overlay') {
                        if (!this.isLoggedIn()) {
                            return;
                        }
                        this.hideLoginModal();
                    }
                });

                // ESC键关闭模态框
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.isLoggedIn()) {
                        this.hideLoginModal();
                    }
                });
            }
        };
