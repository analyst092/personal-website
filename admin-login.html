<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 数据分析师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --green: #00ff88;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: rgba(0, 212, 255, 0.2);
            --admin-gold: #ffd700;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--admin-gold);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--admin-gold);
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .form-group input {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--admin-gold);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .login-btn {
            padding: 1rem;
            background: linear-gradient(135deg, var(--admin-gold) 0%, #ff9500 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1.2rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-link a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .back-link a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="admin-badge">
                <span>👑</span>
                <span>管理员入口</span>
            </div>
            <h1>管理员登录</h1>
            <p>请输入管理员账号登录后台管理系统</p>
        </div>
        <form class="login-form" id="admin-login-form">
            <div class="form-group">
                <label for="admin-phone">管理员手机号</label>
                <input type="tel" id="admin-phone" name="phone" placeholder="请输入管理员手机号" maxlength="11" required>
            </div>
            <div class="form-group">
                <label for="admin-password">管理员密码</label>
                <input type="password" id="admin-password" name="password" placeholder="请输入管理员密码" required>
            </div>
            <div class="login-error" id="login-error"></div>
            <button type="submit" class="login-btn" id="login-btn">登录后台</button>
        </form>
        <div class="back-link">
            <a href="index.html">← 返回主页</a>
        </div>
    </div>

    <script>
        // 管理员账号（预设）
        const ADMIN_PHONE = '18888888888';
        const ADMIN_PASSWORD = 'admin888';

        // 检查是否已是管理员登录状态
        if (localStorage.getItem('isAdminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        // 登录表单处理
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('admin-phone').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorDiv = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            // 验证手机号格式
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                errorDiv.textContent = '请输入正确的手机号格式';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '验证中...';

            setTimeout(() => {
                // 验证管理员账号
                if (phone === ADMIN_PHONE && password === ADMIN_PASSWORD) {
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    localStorage.setItem('adminPhone', phone);
                    localStorage.setItem('adminName', '超级管理员');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // 检查是否是被设置为管理员的用户
                    const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
                    const user = users.find(u => u.phone === phone && u.password === password && u.isAdmin);
                    
                    if (user) {
                        localStorage.setItem('isAdminLoggedIn', 'true');
                        localStorage.setItem('adminPhone', phone);
                        localStorage.setItem('adminName', user.nickname);
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        errorDiv.textContent = '账号或密码错误，或该账号不是管理员';
                    }
                }
                
                loginBtn.disabled = false;
                loginBtn.textContent = '登录后台';
            }, 500);
        });
    </script>
</body>
</html>
