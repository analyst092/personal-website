<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 用户管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --green: #00ff88;
            --text: #e8e8e8;
            --text-dim: #888;
            --border: rgba(0, 212, 255, 0.2);
            --admin-gold: #ffd700;
            --danger: #ff6b6b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* 导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .logo a {
            color: var(--accent);
            text-decoration: none;
        }

        .admin-badge {
            padding: 0.3rem 0.8rem;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--admin-gold);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--admin-gold);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .admin-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--admin-gold) 0%, #ff9500 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: #000;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* 主内容区 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem 4rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-dim);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .stat-card.admin .stat-value {
            color: var(--admin-gold);
        }

        /* 用户表格 */
        .table-container {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .table-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-box input {
            padding: 0.6rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            width: 200px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem 1.5rem;
            text-align: left;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text);
        }

        tr:hover td {
            background: rgba(0, 212, 255, 0.03);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--green) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #fff;
        }

        .user-avatar.admin {
            background: linear-gradient(135deg, var(--admin-gold) 0%, #ff9500 100%);
            color: #000;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
        }

        .user-phone {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .role-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .role-badge.admin {
            background: rgba(255, 215, 0, 0.1);
            color: var(--admin-gold);
            border: 1px solid var(--admin-gold);
        }

        .role-badge.user {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-admin {
            background: rgba(255, 215, 0, 0.1);
            color: var(--admin-gold);
            border: 1px solid var(--admin-gold);
        }

        .btn-admin:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .btn-admin.active {
            background: var(--admin-gold);
            color: #000;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--text-dim);
        }

        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 600px;
            }

            .search-box input {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <a href="index.html">田承奇</a>
            <span class="admin-badge">管理员后台</span>
        </div>
        <div class="nav-right">
            <div class="admin-info">
                <div class="admin-avatar" id="admin-avatar">管</div>
                <span id="admin-name">管理员</span>
            </div>
            <button class="logout-btn" onclick="adminLogout()">退出登录</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>用户管理</h1>
            <p>管理所有注册用户，设置管理员权限</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-users">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card admin">
                <div class="stat-value" id="admin-count">0</div>
                <div class="stat-label">管理员数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="normal-count">0</div>
                <div class="stat-label">普通用户</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">用户列表</div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索手机号或昵称..." oninput="filterUsers()">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>用户信息</th>
                        <th>手机号</th>
                        <th>角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 检查管理员登录状态
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        // 显示管理员信息
        document.getElementById('admin-name').textContent = localStorage.getItem('adminName') || '管理员';

        // 预设管理员账号
        const SUPER_ADMIN = { phone: '18888888888', nickname: '超级管理员', isAdmin: true, isSuper: true };

        // 获取所有用户（包括预设管理员）
        function getAllUsers() {
            const stored = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            return [SUPER_ADMIN, ...stored];
        }

        // 保存用户数据
        function saveUsers(users) {
            // 不保存超级管理员，因为是预设的
            const filtered = users.filter(u => !u.isSuper);
            localStorage.setItem('registeredUsers', JSON.stringify(filtered));
        }

        // 更新统计数据
        function updateStats() {
            const users = getAllUsers();
            const adminCount = users.filter(u => u.isAdmin).length;
            const normalCount = users.filter(u => !u.isAdmin).length;

            document.getElementById('total-users').textContent = users.length;
            document.getElementById('admin-count').textContent = adminCount;
            document.getElementById('normal-count').textContent = normalCount;
        }

        // 渲染用户表格
        function renderUsers(searchTerm = '') {
            const users = getAllUsers();
            const filtered = users.filter(u => {
                if (!searchTerm) return true;
                return u.phone.includes(searchTerm) || u.nickname.includes(searchTerm);
            });

            const tbody = document.getElementById('user-table-body');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无用户数据</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(user => `
                <tr>
                    <td>
                        <div class="user-info">
                            <div class="user-avatar ${user.isAdmin ? 'admin' : ''}">${user.nickname.charAt(0)}</div>
                            <div>
                                <div class="user-name">${user.nickname}</div>
                            </div>
                        </div>
                    </td>
                    <td>${user.phone}</td>
                    <td>
                        <span class="role-badge ${user.isAdmin ? 'admin' : 'user'}">
                            ${user.isAdmin ? '管理员' : '普通用户'}
                        </span>
                    </td>
                    <td>
                        <div class="action-btns">
                            ${user.isSuper ? '<span style="color:var(--text-dim);font-size:0.8rem">超级管理员</span>' : `
                                <button class="btn btn-admin ${user.isAdmin ? 'active' : ''}" onclick="toggleAdmin('${user.phone}')">
                                    ${user.isAdmin ? '取消管理员' : '设为管理员'}
                                </button>
                                <button class="btn btn-delete" onclick="deleteUser('${user.phone}')">删除</button>
                            `}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 搜索过滤
        function filterUsers() {
            const searchTerm = document.getElementById('search-input').value.trim();
            renderUsers(searchTerm);
            updateStats();
        }

        // 切换管理员权限
        function toggleAdmin(phone) {
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const userIndex = users.findIndex(u => u.phone === phone);

            if (userIndex !== -1) {
                users[userIndex].isAdmin = !users[userIndex].isAdmin;
                saveUsers(users);
                renderUsers(document.getElementById('search-input').value.trim());
                updateStats();
            }
        }

        // 删除用户
        function deleteUser(phone) {
            if (!confirm('确定要删除该用户吗？此操作不可恢复。')) return;

            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            users = users.filter(u => u.phone !== phone);
            saveUsers(users);
            renderUsers(document.getElementById('search-input').value.trim());
            updateStats();
        }

        // 管理员退出
        function adminLogout() {
            localStorage.removeItem('isAdminLoggedIn');
            localStorage.removeItem('adminPhone');
            localStorage.removeItem('adminName');
            window.location.href = 'admin-login.html';
        }

        // 初始化
        renderUsers();
        updateStats();
    </script>
</body>
</html>
